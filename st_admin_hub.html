<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>053 SHOT TRACKER 管理ハブ</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --line:#d8e0ea;
      --text:#1f2937;
      --sub:#6b7280;
      --primary:#111827;
      --accent:#2563eb;
      --accent-soft:#eff6ff;
      --danger:#dc2626;
      --danger-soft:#fef2f2;
      --success:#16a34a;
      --success-soft:#f0fdf4;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:18px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic UI","Yu Gothic",sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .page{
      max-width:1100px;
      margin:0 auto;
      padding:24px 16px 48px;
    }

    .header{
      margin-bottom:18px;
    }

    .eyebrow{
      display:inline-block;
      font-size:12px;
      font-weight:700;
      letter-spacing:.08em;
      color:var(--accent);
      background:var(--accent-soft);
      border-radius:999px;
      padding:6px 10px;
      margin-bottom:12px;
    }

    h1{
      margin:0 0 8px;
      font-size:28px;
      line-height:1.35;
      color:var(--primary);
    }

    .lead{
      margin:0;
      color:var(--sub);
      font-size:14px;
      line-height:1.8;
    }

    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .tabs{
      display:flex;
      gap:8px;
      padding:16px;
      border-bottom:1px solid var(--line);
      background:#fcfdff;
      flex-wrap:wrap;
    }

    .tab-btn{
      border:none;
      background:#eef2f7;
      color:#334155;
      padding:10px 16px;
      border-radius:999px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
    }

    .tab-btn.active{
      background:var(--primary);
      color:#fff;
    }

    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      padding:16px;
      border-bottom:1px solid var(--line);
      background:#fff;
    }

    .toolbar .left{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .toolbar .right{
      margin-left:auto;
      color:var(--sub);
      font-size:13px;
    }

    button{
      border:none;
      border-radius:12px;
      padding:12px 16px;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
      transition:opacity .2s, transform .02s ease;
    }

    button:active{
      transform:translateY(1px);
    }

    button:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .btn-dark{
      background:var(--primary);
      color:#fff;
    }

    .btn-danger{
      background:var(--danger-soft);
      color:var(--danger);
      border:1px solid #fecaca;
    }

    .btn-ghost{
      background:#f8fafc;
      color:#334155;
      border:1px solid var(--line);
    }

    select{
      height:44px;
      border:1px solid var(--line);
      border-radius:12px;
      padding:0 12px;
      background:#fff;
      font-size:14px;
      color:var(--text);
      outline:none;
    }

    .status-box{
      display:none;
      margin:16px;
      border-radius:14px;
      padding:14px 15px;
      font-size:14px;
      line-height:1.8;
      border:1px solid var(--line);
      background:#fff;
      white-space:pre-wrap;
    }

    .status-box.show{ display:block; }
    .status-box.info{
      background:#f8fafc;
      border-color:#dbe5ef;
      color:#334155;
    }
    .status-box.success{
      background:#f0fdf4;
      border-color:#bbf7d0;
      color:#166534;
    }
    .status-box.error{
      background:#fef2f2;
      border-color:#fecaca;
      color:#991b1b;
    }

    .table-wrap{
      overflow:auto;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:760px;
    }

    th, td{
      padding:14px 12px;
      border-bottom:1px solid var(--line);
      text-align:left;
      font-size:14px;
      vertical-align:middle;
    }

    th{
      background:#fcfdff;
      color:#475569;
      font-weight:800;
      white-space:nowrap;
    }

    td{
      color:var(--text);
      background:#fff;
    }

    tr:hover td{
      background:#fafcff;
    }

    .name{
      font-weight:700;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:74px;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      line-height:1;
      white-space:nowrap;
    }

    .badge.pending{
      background:#fef3c7;
      color:#92400e;
    }

    .badge.active{
      background:#dcfce7;
      color:#166534;
    }

    .badge.inactive{
      background:#f3f4f6;
      color:#374151;
    }

    .badge.free{
      background:#e0f2fe;
      color:#075985;
    }

    .badge.paid{
      background:#ede9fe;
      color:#5b21b6;
    }

    .badge.full{
      background:#fee2e2;
      color:#991b1b;
    }

    .empty{
      padding:48px 20px;
      text-align:center;
      color:var(--sub);
      font-size:14px;
      line-height:1.8;
    }

    .footer-note{
      margin-top:16px;
      font-size:12px;
      color:var(--sub);
      line-height:1.8;
    }

    @media (max-width: 720px){
      .toolbar{
        align-items:stretch;
      }

      .toolbar .left,
      .toolbar .right{
        width:100%;
      }

      .toolbar .right{
        margin-left:0;
      }

      button, select{
        width:100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div class="eyebrow">053 SHOT TRACKER</div>
      <h1>管理ハブ</h1>
      <p class="lead">登録申請と会員状態を管理します。</p>
    </div>

    <div class="panel">
      <div class="tabs">
        <button class="tab-btn active" data-status="仮登録" onclick="switchTab('仮登録', this)">仮登録</button>
        <button class="tab-btn" data-status="有効" onclick="switchTab('有効', this)">有効</button>
        <button class="tab-btn" data-status="無効" onclick="switchTab('無効', this)">無効</button>
      </div>

      <div class="toolbar">
        <div class="left">
          <button class="btn-dark" id="approveBtn" onclick="bulkApprove()">一括承認</button>
          <button class="btn-danger" onclick="bulkDisable()">一括無効</button>
          <select id="membershipSelect">
            <option value="">会員区分を選択</option>
            <option value="無料">無料</option>
            <option value="有料">有料</option>
            <option value="完全版">完全版</option>
          </select>
          <button class="btn-ghost" onclick="bulkUpdateMembership()">会員区分を適用</button>
        </div>
        <div class="right">
          <span id="countLabel">0件</span>
        </div>
      </div>

      <div id="statusBox" class="status-box info"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:52px;">
                <input type="checkbox" id="selectAll" onchange="toggleSelectAll(this.checked)" />
              </th>
              <th>選手名</th>
              <th>登録日</th>
              <th>ステータス</th>
              <th>会員区分</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="5" class="empty">読み込み中です…</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="footer-note">
      初期版では、登録申請と会員状態の管理に限定しています。承認後のユーザー通知はまだ行いません。
    </div>
  </div>

  <script>
    const GAS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbzmTEyG5YwzVLn_Fou8jRWqD7zXOpZ38ljCn4V3dFYlBqXR9G9ApO-WwZb25hJUgsJd/exec';

    let currentStatus = '仮登録';
    let currentItems = [];

    function showStatus(message, type = 'info') {
      const box = document.getElementById('statusBox');
      box.className = 'status-box show ' + type;
      box.textContent = message;
    }

    function clearStatus() {
      const box = document.getElementById('statusBox');
      box.className = 'status-box';
      box.textContent = '';
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      return dateStr;
    }

    function getStatusBadge(status) {
      if (status === '仮登録') return '<span class="badge pending">仮登録</span>';
      if (status === '有効') return '<span class="badge active">有効</span>';
      if (status === '無効') return '<span class="badge inactive">無効</span>';
      return status || '';
    }

    function getMembershipBadge(membership) {
      if (membership === '無料') return '<span class="badge free">無料</span>';
      if (membership === '有料') return '<span class="badge paid">有料</span>';
      if (membership === '完全版') return '<span class="badge full">完全版</span>';
      return membership || '';
    }

    function renderTable(items) {
      const body = document.getElementById('tableBody');
      const countLabel = document.getElementById('countLabel');
      const approveBtn = document.getElementById('approveBtn');
      const selectAll = document.getElementById('selectAll');

      currentItems = items || [];
      countLabel.textContent = currentItems.length + '件';
      selectAll.checked = false;

      approveBtn.style.display = currentStatus === '仮登録' ? 'inline-block' : 'none';

      if (!currentItems.length) {
        body.innerHTML = '<tr><td colspan="5" class="empty">該当ユーザーはいません。</td></tr>';
        return;
      }

      body.innerHTML = currentItems.map(item => {
        return `
          <tr>
            <td>
              <input type="checkbox" class="row-check" value="${escapeHtml(item.pageId || '')}">
            </td>
            <td class="name">${escapeHtml(item.playerName || '')}</td>
            <td>${escapeHtml(formatDate(item.registerDate || ''))}</td>
            <td>${getStatusBadge(item.status || '')}</td>
            <td>${getMembershipBadge(item.membership || '')}</td>
          </tr>
        `;
      }).join('');
    }

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function switchTab(status, btn) {
      currentStatus = status;
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      btn.classList.add('active');
      loadUsers();
    }

    function toggleSelectAll(checked) {
      document.querySelectorAll('.row-check').forEach(el => {
        el.checked = checked;
      });
    }

    function getSelectedPageIds() {
      return Array.from(document.querySelectorAll('.row-check:checked')).map(el => el.value);
    }

    async function loadUsers() {
      try {
        clearStatus();
        renderTable([]);
        document.getElementById('tableBody').innerHTML =
          '<tr><td colspan="5" class="empty">読み込み中です…</td></tr>';

        const response = await fetch(GAS_ENDPOINT, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify({
            source: 'st_admin_hub',
            action: 'list_users',
            status: currentStatus
          })
        });

        const result = await response.json();

        if (result.status !== 'ok') {
          showStatus(result.message || '一覧取得に失敗しました。', 'error');
          renderTable([]);
          return;
        }

        renderTable(result.items || []);
      } catch (error) {
        console.error(error);
        showStatus('通信エラーが発生しました。時間をおいて再度お試しください。', 'error');
        renderTable([]);
      }
    }

    async function postBulkAction(payload) {
      try {
        const response = await fetch(GAS_ENDPOINT, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify(payload)
        });

        return await response.json();
      } catch (error) {
        console.error(error);
        return {
          status: 'error',
          message: '通信エラーが発生しました。'
        };
      }
    }

    async function bulkApprove() {
      const pageIds = getSelectedPageIds();
      if (!pageIds.length) {
        showStatus('対象ユーザーを選択してください。', 'error');
        return;
      }

      const ok = confirm('選択したユーザーを一括承認します。よろしいですか？');
      if (!ok) return;

      const result = await postBulkAction({
        source: 'st_admin_hub',
        action: 'bulk_update_status',
        pageIds: pageIds,
        newStatus: '有効'
      });

      if (result.status === 'ok') {
        showStatus('一括承認が完了しました。', 'success');
        loadUsers();
      } else {
        showStatus(result.message || '一括承認に失敗しました。', 'error');
      }
    }

    async function bulkDisable() {
      const pageIds = getSelectedPageIds();
      if (!pageIds.length) {
        showStatus('対象ユーザーを選択してください。', 'error');
        return;
      }

      const ok = confirm('選択したユーザーを無効にします。よろしいですか？');
      if (!ok) return;

      const result = await postBulkAction({
        source: 'st_admin_hub',
        action: 'bulk_update_status',
        pageIds: pageIds,
        newStatus: '無効'
      });

      if (result.status === 'ok') {
        showStatus('一括無効化が完了しました。', 'success');
        loadUsers();
      } else {
        showStatus(result.message || '一括無効化に失敗しました。', 'error');
      }
    }

    async function bulkUpdateMembership() {
      const pageIds = getSelectedPageIds();
      const newMembership = document.getElementById('membershipSelect').value;

      if (!pageIds.length) {
        showStatus('対象ユーザーを選択してください。', 'error');
        return;
      }

      if (!newMembership) {
        showStatus('会員区分を選択してください。', 'error');
        return;
      }

      const ok = confirm('選択したユーザーの会員区分を「' + newMembership + '」へ変更します。よろしいですか？');
      if (!ok) return;

      const result = await postBulkAction({
        source: 'st_admin_hub',
        action: 'bulk_update_membership',
        pageIds: pageIds,
        newMembership: newMembership
      });

      if (result.status === 'ok') {
        showStatus('会員区分の更新が完了しました。', 'success');
        loadUsers();
      } else {
        showStatus(result.message || '会員区分更新に失敗しました。', 'error');
      }
    }

    window.addEventListener('load', loadUsers);
  </script>
</body>
</html>
