<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>053 SHOT TRACKER 登録申請</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --line:#d8e0ea;
      --text:#1f2937;
      --sub:#6b7280;
      --primary:#111827;
      --accent:#2563eb;
      --accent-soft:#eff6ff;
      --danger:#dc2626;
      --success:#16a34a;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:18px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic UI","Yu Gothic",sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px 16px;
    }

    .card{
      width:100%;
      max-width:460px;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:28px 22px 22px;
    }

    .eyebrow{
      display:inline-block;
      font-size:12px;
      font-weight:700;
      letter-spacing:.08em;
      color:var(--accent);
      background:var(--accent-soft);
      border-radius:999px;
      padding:6px 10px;
      margin-bottom:14px;
    }

    h1{
      margin:0 0 10px;
      font-size:24px;
      line-height:1.35;
      font-weight:800;
      color:var(--primary);
    }

    .lead{
      margin:0 0 24px;
      font-size:14px;
      line-height:1.8;
      color:var(--sub);
    }

    .section{
      margin-top:18px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-size:13px;
      font-weight:700;
      color:var(--text);
    }

    input[type="text"]{
      width:100%;
      height:50px;
      border:1px solid var(--line);
      border-radius:14px;
      padding:0 14px;
      font-size:16px;
      color:var(--text);
      background:#fff;
      outline:none;
      transition:border-color .2s, box-shadow .2s;
    }

    input[type="text"]:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 4px rgba(37,99,235,.12);
    }

    .note{
      margin-top:8px;
      font-size:12px;
      line-height:1.7;
      color:var(--sub);
    }

    .actions{
      margin-top:24px;
    }

    button{
      width:100%;
      height:52px;
      border:none;
      border-radius:14px;
      background:var(--primary);
      color:#fff;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
      transition:opacity .2s, transform .02s ease;
    }

    button:active{
      transform:translateY(1px);
    }

    button:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .status{
      display:none;
      margin-top:18px;
      border-radius:14px;
      padding:14px 15px;
      font-size:14px;
      line-height:1.8;
      border:1px solid var(--line);
      background:#fff;
      white-space:pre-wrap;
    }

    .status.show{ display:block; }
    .status.info{
      background:#f8fafc;
      border-color:#dbe5ef;
      color:#334155;
    }
    .status.success{
      background:#f0fdf4;
      border-color:#bbf7d0;
      color:#166534;
    }
    .status.error{
      background:#fef2f2;
      border-color:#fecaca;
      color:#991b1b;
    }

    .footer{
      margin-top:20px;
      padding-top:16px;
      border-top:1px solid var(--line);
      font-size:12px;
      line-height:1.8;
      color:var(--sub);
    }

    .loading{
      display:inline-flex;
      align-items:center;
      gap:8px;
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:currentColor;
      animation:blink 1.2s infinite;
    }

    .dot:nth-child(2){ animation-delay:.2s; }
    .dot:nth-child(3){ animation-delay:.4s; }

    @keyframes blink{
      0%,80%,100%{ opacity:.25; transform:scale(.85); }
      40%{ opacity:1; transform:scale(1); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="eyebrow">053 SHOT TRACKER</div>
      <h1>登録申請</h1>
      <p class="lead">
        初回利用の方は、選手名を入力して登録申請をしてください。<br>
        管理者の確認後、利用できるようになります。
      </p>

      <div class="section">
        <label for="playerName">選手名</label>
        <input
          id="playerName"
          type="text"
          placeholder="例：053 太郎"
          maxlength="30"
          autocomplete="off"
        />
        <div class="note">
          ニックネームではなく、管理しやすい選手名で入力してください。
        </div>
      </div>

      <div class="actions">
        <button id="submitBtn" type="button" onclick="submitRegistration()">
          登録申請する
        </button>
      </div>

      <div id="statusBox" class="status info"></div>

      <div class="footer">
        登録申請時にはLINEのuserIdを取得して、053 SHOT TRACKERのユーザー管理に利用します。
      </div>
    </div>
  </div>

  <script>
    const LIFF_ID = 'ここにLIFF_IDを入れてください';
    const GAS_ENDPOINT = 'ここにGASのWebアプリURLを入れてください';

    let currentUserId = '';

    function showStatus(message, type = 'info') {
      const box = document.getElementById('statusBox');
      box.className = 'status show ' + type;
      box.textContent = message;
    }

    function setLoading(isLoading) {
      const btn = document.getElementById('submitBtn');
      btn.disabled = isLoading;

      if (isLoading) {
        btn.innerHTML = `
          <span class="loading">
            送信中
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </span>
        `;
      } else {
        btn.textContent = '登録申請する';
      }
    }

    async function initLiffApp() {
      try {
        showStatus('LINE連携を確認しています…', 'info');

        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        currentUserId = profile.userId || '';

        if (!currentUserId) {
          showStatus('LINE userId の取得に失敗しました。時間をおいて再度お試しください。', 'error');
          return;
        }

        showStatus('登録申請の準備ができました。選手名を入力してください。', 'info');
      } catch (error) {
        console.error(error);
        showStatus('初期化中にエラーが発生しました。時間をおいて再度お試しください。', 'error');
      }
    }

    async function submitRegistration() {
      const playerNameInput = document.getElementById('playerName');
      const playerName = (playerNameInput.value || '').trim();

      if (!currentUserId) {
        showStatus('LINE userId が取得できていません。ページを開き直してください。', 'error');
        return;
      }

      if (!playerName) {
        showStatus('選手名を入力してください。', 'error');
        playerNameInput.focus();
        return;
      }

      try {
        setLoading(true);
        showStatus('登録申請を送信しています…', 'info');

        const response = await fetch(GAS_ENDPOINT, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify({
            source: 'st_registration',
            userId: currentUserId,
            playerName: playerName
          })
        });

        const result = await response.json();

        if (result.status === 'ok') {
          showStatus(result.message, 'success');
          playerNameInput.value = '';
          return;
        }

        if (result.status === 'active' || result.status === 'pending' || result.status === 'inactive') {
          showStatus(result.message, 'info');
          return;
        }

        showStatus(result.message || '登録申請に失敗しました。', 'error');
      } catch (error) {
        console.error(error);
        showStatus('通信エラーが発生しました。時間をおいて再度お試しください。', 'error');
      } finally {
        setLoading(false);
      }
    }

    window.addEventListener('load', initLiffApp);
  </script>
</body>
</html>
